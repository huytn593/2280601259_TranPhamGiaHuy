<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biểu mẫu Bác sĩ - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h3 class="mb-4" th:text="${doctor.id == null ? 'Thêm mới Bác sĩ' : 'Cập nhật thông tin Bác sĩ'}"></h3>
            <form th:action="@{/admin/doctors/save}" th:object="${doctor}" method="post" class="card p-4 shadow-sm">
                <input type="hidden" th:field="*{id}" />
                <div class="mb-3">
                    <label class="form-label">Tên Bác sĩ</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Chuyên khoa</label>
                    <input type="text" th:field="*{specialty}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Đường dẫn Ảnh (URL)</label>
                    <input type="text" th:field="*{image}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Khoa</label>
                    <select th:field="*{department.id}" class="form-select">
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                    </select>
                </div>
                <div>
                    <button type="submit" class="btn btn-success">Lưu thông tin</button>
                    <a th:href="@{/admin/doctors}" class="btn btn-secondary">Huỷ bỏ</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
