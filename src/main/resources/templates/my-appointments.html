<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch khám của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Clinic App</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/}" class="btn btn-outline-light">Trang chủ</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Lịch khám của tôi</h2>
    
    <div th:if="${appointments.empty}" class="alert alert-info">
        Bạn chưa đăng ký lịch khám nào.
    </div>
    
    <table class="table table-bordered table-striped bg-white shadow-sm" th:unless="${appointments.empty}">
        <thead class="table-dark">
            <tr>
                <th>Tên Bác sĩ</th>
                <th>Khoa</th>
                <th>Thời gian khám</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="appointment : ${appointments}">
                <td th:text="${appointment.doctor.name}"></td>
                <td th:text="${appointment.doctor.department != null ? appointment.doctor.department.name : ''}"></td>
                <td th:text="${#temporals.format(appointment.appointmentDate, 'dd/MM/yyyy HH:mm')}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
